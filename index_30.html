<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>REVLINE — live car meet map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
  /* ---------- INSTRUMENT-CLUSTER THEME ----------
     Near-black cockpit, amber gauge glow, monospace telemetry digits.
     Speed is a first-class citizen, so the UI reads like a dash. */
  :root{
    --bg:#0a0b0d; --panel:#131519; --panel-2:#1a1d23;
    --line:#262b33; --ink:#e8ebef; --muted:#8b929d;
    --amber:#ff9f1c;      /* gauge glow */
    --amber-dim:#c77b12;
    --red:#ff3b30;        /* redline */
    --good:#37d67a;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);
    font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    -webkit-tap-highlight-color:transparent;overscroll-behavior:none}
  .mono{font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace;font-variant-numeric:tabular-nums}

  #map{position:fixed;inset:0;z-index:0;background:#0a0b0d;filter:saturate(.85) brightness(.9)}
  .leaflet-container{background:#0a0b0d}

  /* Top status bar */
  #topbar{position:fixed;top:0;left:0;right:0;z-index:600;
    display:flex;align-items:center;gap:12px;padding:10px 14px;
    padding-top:calc(10px + env(safe-area-inset-top));
    background:linear-gradient(180deg,rgba(10,11,13,.92),rgba(10,11,13,.55) 80%,transparent);
    pointer-events:none}
  #topbar > *{pointer-events:auto}
  .brand{font-weight:800;letter-spacing:.14em;font-size:15px}
  .brand b{color:var(--amber)}
  .my-speed{margin-left:auto;text-align:right;line-height:1}
  .my-speed .val{font-size:30px;font-weight:800;color:var(--amber);
    text-shadow:0 0 12px rgba(255,159,28,.45)}
  .my-speed .unit{font-size:10px;letter-spacing:.2em;color:var(--muted)}
  .count{background:var(--panel);border:1px solid var(--line);border-radius:999px;
    padding:5px 11px;font-size:12px;color:var(--muted)}
  .count b{color:var(--good)}

  /* Bottom control dock */
  #dock{position:fixed;left:0;right:0;bottom:0;z-index:600;
    padding:10px 12px calc(10px + env(safe-area-inset-bottom));
    display:flex;gap:8px;
    background:linear-gradient(0deg,rgba(10,11,13,.92),transparent)}
  .btn{flex:0 0 auto;border:1px solid var(--line);background:var(--panel);color:var(--ink);
    border-radius:12px;padding:12px 14px;font-size:14px;font-weight:600;cursor:pointer}
  .btn:active{transform:scale(.97)}
  .btn.primary{background:var(--amber);color:#1a1200;border-color:var(--amber)}
  .btn.ghost.on{background:#2a1416;border-color:var(--red);color:var(--red)}
  .btn.wide{flex:1}

  /* Panels (join + chat) share a sheet look */
  .sheet{position:fixed;left:0;right:0;bottom:0;z-index:700;
    background:var(--panel);border-top:1px solid var(--line);
    border-radius:20px 20px 0 0;padding:18px 18px calc(18px + env(safe-area-inset-bottom));
    box-shadow:0 -20px 60px rgba(0,0,0,.6);transform:translateY(110%);
    transition:transform .28s cubic-bezier(.2,.8,.2,1);max-height:85vh;overflow:auto}
  .sheet.open{transform:translateY(0)}
  .sheet h2{margin:0 0 2px;font-size:19px;letter-spacing:.02em}
  .sheet .sub{margin:0 0 16px;color:var(--muted);font-size:13px}
  .field{margin-bottom:12px}
  .field label{display:block;font-size:11px;letter-spacing:.14em;text-transform:uppercase;
    color:var(--muted);margin-bottom:6px}
  .field input, .field select{width:100%;background:var(--panel-2);border:1px solid var(--line);
    color:var(--ink);border-radius:10px;padding:12px;font-size:15px}
  .field input:focus, .field select:focus{outline:none;border-color:var(--amber)}
  .row{display:flex;gap:10px}
  .row .field{flex:1}
  .swatches{display:flex;gap:8px;flex-wrap:wrap}
  .swatch{width:34px;height:34px;border-radius:9px;border:2px solid transparent;cursor:pointer}
  .swatch.sel{border-color:#fff}

  /* Chat */
  #chatLog{display:flex;flex-direction:column;gap:8px;margin-bottom:10px;
    max-height:48vh;overflow:auto;padding-right:2px}
  .msg{max-width:85%;padding:8px 11px;border-radius:12px;font-size:14px;line-height:1.35;
    background:var(--panel-2);align-self:flex-start;border:1px solid var(--line)}
  .msg.me{align-self:flex-end;background:#2a2010;border-color:var(--amber-dim)}
  .msg .who{font-size:11px;font-weight:700;margin-bottom:2px}
  .chatbar{display:flex;gap:8px}
  .chatbar input{flex:1;background:var(--panel-2);border:1px solid var(--line);color:var(--ink);
    border-radius:10px;padding:12px;font-size:15px}
  .chatbar input:focus{outline:none;border-color:var(--amber)}

  /* Car marker on map: a rotating chip with handle + speed */
  .car{transform-origin:center;will-change:transform}
  .car .body{width:26px;height:26px;border-radius:8px;display:grid;place-items:center;
    font-size:15px;box-shadow:0 0 0 2px rgba(0,0,0,.5), 0 4px 10px rgba(0,0,0,.5)}
  .car .tag{position:absolute;left:50%;top:32px;transform:translateX(-50%);white-space:nowrap;
    background:rgba(10,11,13,.85);border:1px solid var(--line);border-radius:7px;
    padding:2px 6px;font-size:10px;font-weight:700;line-height:1.2;text-align:center}
  .car .tag .sp{color:var(--amber);font-family:ui-monospace,monospace}

  .toast{position:fixed;left:50%;top:70px;transform:translateX(-50%);z-index:800;
    background:var(--panel);border:1px solid var(--line);border-radius:10px;
    padding:10px 14px;font-size:13px;color:var(--muted);max-width:90vw;text-align:center;
    opacity:0;transition:opacity .25s;pointer-events:none}
  .toast.show{opacity:1}
  .warn{color:var(--red)}
</style>
</head>
<body>

<div id="map"></div>

<div id="topbar">
  <div class="brand"><b>REV</b>LINE</div>
  <div class="count">crew <b id="crewCount">0</b></div>
  <div class="my-speed">
    <div class="val mono" id="mySpeed">--</div>
    <div class="unit">MPH</div>
  </div>
</div>

<div id="dock">
  <button class="btn wide" id="btnRecenter">Recenter on me</button>
  <button class="btn ghost" id="btnGhost">Go ghost</button>
  <button class="btn primary" id="btnChat">Chat</button>
</div>

<!-- JOIN SHEET -->
<div class="sheet open" id="joinSheet">
  <h2>Roll into the meet</h2>
  <p class="sub">Your live spot + speed shows to the crew while this is open. Close the tab and you drop off.</p>

  <div class="field">
    <label>Handle</label>
    <input id="inHandle" placeholder="e.g. BoostedBrad" maxlength="18" autocomplete="off" />
  </div>
  <div class="row">
    <div class="field">
      <label>Make</label>
      <input id="inMake" placeholder="Subaru" maxlength="16" autocomplete="off" />
    </div>
    <div class="field">
      <label>Model</label>
      <input id="inModel" placeholder="WRX" maxlength="16" autocomplete="off" />
    </div>
    <div class="field" style="flex:0 0 78px">
      <label>Year</label>
      <input id="inYear" placeholder="'04" maxlength="5" autocomplete="off" />
    </div>
  </div>
  <div class="field">
    <label>Color</label>
    <div class="swatches" id="swatches"></div>
  </div>
  <button class="btn primary wide" id="btnJoin" style="margin-top:6px">Share my location &amp; join</button>
  <p class="sub" style="margin-top:12px">Location is shared only with people in this room and only while you're online.</p>
</div>

<!-- CHAT SHEET -->
<div class="sheet" id="chatSheet">
  <h2>Crew chat</h2>
  <p class="sub">Everyone in the room sees these. Not stored — clears when you leave.</p>
  <div id="chatLog"></div>
  <div class="chatbar">
    <input id="chatInput" placeholder="say something…" maxlength="240" />
    <button class="btn primary" id="btnSend">Send</button>
  </div>
  <button class="btn wide" id="btnCloseChat" style="margin-top:10px">Back to map</button>
</div>

<div class="toast" id="toast"></div>

<script>
/* ============================================================
   CONFIG — Ron, fill these two after you create your Supabase project.
   Supabase → Project Settings → API. Anon key is safe in front-end code.
   ============================================================ */
const SUPABASE_URL  = "https://wgjuiruqqodbrmpqwzbo.supabase.co";
const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndnanVpcnVxcW9kYnJtcHF3emJvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI5NDcwMjgsImV4cCI6MjA5ODUyMzAyOH0.rWQ8ni4BlpLzobiOGgmSNmKrjSLVeXTVUXU5jShfmj4";
const ROOM = "fredericksburg-meet";              // change per meet/city to make separate rooms
/* ============================================================ */

const COLORS = ["#e8ebef","#ff3b30","#ff9f1c","#37d67a","#3aa0ff","#b06bff","#ff6bd0","#0a0b0d"];
const CENTER_DEFAULT = [38.3032, -77.4605]; // Fredericksburg, VA

// ---- state ----
let me = { id: crypto.randomUUID(), handle:"", car:"", color:COLORS[2], lat:null, lng:null, speed:null, heading:null, ghost:false };
let channel = null, watchId = null, map = null, myMarker = null;
const markers = {}; // id -> leaflet marker

// ---- helpers ----
const $ = s => document.querySelector(s);
const mps2mph = m => (m == null || m < 0) ? null : m * 2.2369362921;
function toast(msg, warn){ const t=$("#toast"); t.textContent=msg; t.className="toast show"+(warn?" warn":"");
  clearTimeout(toast._t); toast._t=setTimeout(()=>t.className="toast",3200); }

// ---- build color swatches ----
const sw = $("#swatches");
COLORS.forEach(c=>{ const d=document.createElement("div"); d.className="swatch"+(c===me.color?" sel":"");
  d.style.background=c; if(c==="#0a0b0d") d.style.borderColor="#333";
  d.onclick=()=>{ me.color=c; [...sw.children].forEach(x=>x.classList.remove("sel")); d.classList.add("sel"); };
  sw.appendChild(d); });

// ---- map ----
function initMap(){
  map = L.map("map",{zoomControl:false,attributionControl:false}).setView(CENTER_DEFAULT, 13);
  // Dark tiles (CARTO dark, free). Falls back gracefully if blocked.
  L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",
    {maxZoom:19, subdomains:"abcd"}).addTo(map);
}

function carIcon(m){
  const spd = mps2mph(m.speed);
  const spTxt = spd==null ? "--" : Math.round(spd);
  const rot = (m.heading!=null && !isNaN(m.heading)) ? m.heading : 0;
  const glyph = m.ghost ? "👻" : "🚗";
  return L.divIcon({
    className:"", iconSize:[26,26], iconAnchor:[13,13],
    html:`<div class="car" style="transform:rotate(${rot}deg)">
            <div class="body" style="background:${m.color||'#ff9f1c'}">${glyph}</div>
          </div>
          <div class="tag"><div>${escapeHtml(m.handle||'anon')}</div>
            <div><span class="sp">${spTxt}</span> mph</div></div>`
  });
}
function escapeHtml(s){return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}

function renderPeople(state){
  const seen = {};
  Object.values(state).forEach(arr=>{
    const m = arr[0]; if(!m || m.id===me.id || m.ghost || m.lat==null) return;
    seen[m.id]=true;
    if(markers[m.id]){ markers[m.id].setLatLng([m.lat,m.lng]).setIcon(carIcon(m)); }
    else { markers[m.id]=L.marker([m.lat,m.lng],{icon:carIcon(m)}).addTo(map); }
  });
  Object.keys(markers).forEach(id=>{ if(!seen[id]){ map.removeLayer(markers[id]); delete markers[id]; }});
  const total = Object.values(state).filter(a=>a[0] && !a[0].ghost).length;
  $("#crewCount").textContent = total;
}

// ---- Supabase realtime ----
function connect(){
  if(SUPABASE_URL.startsWith("YOUR_")){
    toast("Add your Supabase keys in the code first — see the config block.", true);
    return false;
  }
  const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
  channel = client.channel("room:"+ROOM, {
    config:{ presence:{ key: me.id }, broadcast:{ self:true } }
  });

  channel.on("presence",{event:"sync"}, ()=> renderPeople(channel.presenceState()));
  channel.on("broadcast",{event:"chat"}, ({payload})=> addMsg(payload));

  channel.subscribe(async status=>{
    if(status==="SUBSCRIBED"){ await pushPresence(); toast("Connected. You're live to the crew."); }
    if(status==="CHANNEL_ERROR") toast("Realtime connection error — check your Supabase keys.", true);
  });
  return true;
}
async function pushPresence(){
  if(!channel) return;
  await channel.track({ id:me.id, handle:me.handle, car:me.car, color:me.color,
    lat: me.ghost?null:me.lat, lng: me.ghost?null:me.lng,
    speed: me.ghost?null:me.speed, heading:me.heading, ghost:me.ghost });
}

// ---- geolocation ----
function startTracking(){
  if(!("geolocation" in navigator)){ toast("This device has no GPS support.", true); return; }
  watchId = navigator.geolocation.watchPosition(pos=>{
    me.lat=pos.coords.latitude; me.lng=pos.coords.longitude;
    me.speed=pos.coords.speed; me.heading=pos.coords.heading;
    const mph = mps2mph(me.speed);
    $("#mySpeed").textContent = mph==null ? "--" : Math.round(mph);
    if(myMarker){ myMarker.setLatLng([me.lat,me.lng]).setIcon(carIcon(me)); }
    else { myMarker = L.marker([me.lat,me.lng],{icon:carIcon(me),zIndexOffset:1000}).addTo(map);
           map.setView([me.lat,me.lng],15); }
    pushPresence();
  }, err=>{
    toast(err.code===1 ? "Location permission denied — the app needs it to put you on the map." : "Can't get location right now.", true);
  }, { enableHighAccuracy:true, maximumAge:1000, timeout:15000 });
}

// ---- chat ----
function addMsg(p){
  const log=$("#chatLog"); const d=document.createElement("div");
  d.className="msg"+(p.id===me.id?" me":"");
  d.innerHTML = (p.id===me.id?"":`<div class="who" style="color:${p.color||'#ff9f1c'}">${escapeHtml(p.handle)}</div>`)+escapeHtml(p.text);
  log.appendChild(d); log.scrollTop=log.scrollHeight;
}
function sendChat(){
  const inp=$("#chatInput"); const text=inp.value.trim(); if(!text||!channel) return;
  channel.send({type:"broadcast",event:"chat",payload:{id:me.id,handle:me.handle,color:me.color,text}});
  inp.value="";
}

// ---- UI wiring ----
initMap();

$("#btnJoin").onclick = ()=>{
  const h=$("#inHandle").value.trim();
  if(!h){ toast("Pick a handle first."); return; }
  me.handle=h;
  const yr=$("#inYear").value.trim(), mk=$("#inMake").value.trim(), md=$("#inModel").value.trim();
  me.car=[yr,mk,md].filter(Boolean).join(" ");
  if(!connect()) return;
  startTracking();
  $("#joinSheet").classList.remove("open");
};

$("#btnRecenter").onclick = ()=>{ if(me.lat!=null) map.setView([me.lat,me.lng],15); else toast("No location yet."); };

$("#btnGhost").onclick = ()=>{
  me.ghost=!me.ghost;
  $("#btnGhost").classList.toggle("on",me.ghost);
  $("#btnGhost").textContent = me.ghost ? "Ghost ON" : "Go ghost";
  if(myMarker){ me.ghost ? map.removeLayer(myMarker) : myMarker.addTo(map); }
  pushPresence();
  toast(me.ghost ? "You're hidden from the crew." : "You're visible again.");
};

$("#btnChat").onclick     = ()=> $("#chatSheet").classList.add("open");
$("#btnCloseChat").onclick= ()=> $("#chatSheet").classList.remove("open");
$("#btnSend").onclick     = sendChat;
$("#chatInput").addEventListener("keydown",e=>{ if(e.key==="Enter") sendChat(); });

// clean exit
window.addEventListener("beforeunload", ()=>{ try{ channel && channel.untrack(); }catch(e){} });
</script>
</body>
</html>
